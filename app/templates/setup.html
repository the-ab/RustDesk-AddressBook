{% extends "base.html" %}
{% block title %}{{ t('setup.title', 'Ersteinrichtung') }} - RustDesk AddressBook{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card app-card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">{{ t('setup.title', 'Ersteinrichtung') }}</h1>
        <p class="text-secondary mb-4">{{ t('setup.subtitle', 'Lege den ersten Admin-Benutzer an.') }}</p>
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">{{ t('setup.username', 'Benutzername') }}</label>
            <input class="form-control" name="username" autocomplete="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t('setup.password', 'Passwort') }}</label>
            <input class="form-control" type="password" name="password" minlength="8" autocomplete="new-password" required>
          </div>
          <div class="mb-4">
            <label class="form-label">{{ t('setup.repeat_password', 'Passwort wiederholen') }}</label>
            <input class="form-control" type="password" name="password2" minlength="8" autocomplete="new-password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">{{ t('setup.create', 'Admin anlegen') }}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
